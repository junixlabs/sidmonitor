# IMPORTANT: Change all values before deploying!
# Generate secrets: openssl rand -hex 32
apiVersion: v1
kind: Secret
metadata:
  name: sidmonitor-secrets
  namespace: sidmonitor
  labels:
    app.kubernetes.io/part-of: sidmonitor
type: Opaque
stringData:
  postgres-password: "CHANGE_ME"
  jwt-secret-key: "CHANGE_ME"
  database-url: "postgresql+asyncpg://sidmonitor:CHANGE_ME@postgres:5432/sidmonitor"
