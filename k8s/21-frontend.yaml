apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sidmonitor
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: sidmonitor
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app.kubernetes.io/name: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sidmonitor
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: sidmonitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: sidmonitor
    spec:
      containers:
        - name: frontend
          image: ghcr.io/junixlabs/sidmonitor-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 15
