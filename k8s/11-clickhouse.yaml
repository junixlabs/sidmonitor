apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: sidmonitor
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: sidmonitor
spec:
  type: ClusterIP
  ports:
    - port: 8123
      targetPort: 8123
      name: http
    - port: 9000
      targetPort: 9000
      name: native
  selector:
    app.kubernetes.io/name: clickhouse
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: sidmonitor
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: sidmonitor
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/part-of: sidmonitor
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8
          ports:
            - containerPort: 8123
            - containerPort: 9000
          env:
            - name: CLICKHOUSE_DB
              valueFrom:
                configMapKeyRef:
                  name: sidmonitor-config
                  key: CLICKHOUSE_DB
            - name: CLICKHOUSE_USER
              valueFrom:
                configMapKeyRef:
                  name: sidmonitor-config
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              valueFrom:
                configMapKeyRef:
                  name: sidmonitor-config
                  key: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
          volumeMounts:
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: clickhouse-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
