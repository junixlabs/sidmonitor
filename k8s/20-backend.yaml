apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: sidmonitor
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: sidmonitor
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app.kubernetes.io/name: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sidmonitor
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: sidmonitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: sidmonitor
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo 'Waiting for PostgreSQL...'; sleep 2; done"]
        - name: wait-for-clickhouse
          image: busybox:1.36
          command: ["sh", "-c", "until wget -qO- http://clickhouse:8123/ping; do echo 'Waiting for ClickHouse...'; sleep 2; done"]
      containers:
        - name: backend
          image: ghcr.io/junixlabs/sidmonitor-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: sidmonitor-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sidmonitor-secrets
                  key: database-url
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sidmonitor-secrets
                  key: jwt-secret-key
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
